manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: cannonkeys
      url-base: https://github.com/cannonkeys
  projects:
    # Official ZMK (use this; Photon board comes from the module below)
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    # CannonKeys boards (Photon, etc.) – required for board: photon
    - name: zmk-cannonkeys-keyboards
      remote: cannonkeys
      revision: main
  self:
    path: config