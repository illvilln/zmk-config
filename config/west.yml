manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: cannonkeys
      url-base: https://github.com/cannonkeys
  projects:
    # CannonKeys ZMK fork – provides control_gpio_behavior.dtsi required by Photon board
    - name: zmk
      remote: cannonkeys
      revision: main
      import: app/west.yml
    # CannonKeys boards (Photon, etc.)
    - name: zmk-cannonkeys-keyboards
      remote: cannonkeys
      revision: main
  self:
    path: config